<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graph✨</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b0c10; color: #c5c6c7; font-family: 'Inter', -apple-system, sans-serif; display: flex; height: 100vh; overflow: hidden; }
  #graph { flex: 1; position: relative; }
  #sidebar { width: 300px; background: rgba(31, 40, 51, 0.95); backdrop-filter: blur(10px); border-left: 1px solid #45a29e; display: flex; flex-direction: column; overflow: hidden; z-index: 10; box-shadow: -5px 0 15px rgba(0,0,0,0.3); }
  #search-wrap { padding: 15px; border-bottom: 1px solid #2b3a4a; }
  #search { width: 100%; background: #0b0c10; border: 1px solid #45a29e; color: #66fcf1; padding: 10px 12px; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  #search:focus { border-color: #66fcf1; box-shadow: 0 0 5px rgba(102, 252, 241, 0.4); }
  #search-results { max-height: 200px; overflow-y: auto; padding: 4px 12px; border-bottom: 1px solid #2b3a4a; display: none; background: #1f2833; }
  .search-item { padding: 6px 8px; cursor: pointer; border-radius: 4px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .search-item:hover { background: #2b3a4a; color: #66fcf1; }
  #info-panel { padding: 15px; border-bottom: 1px solid #2b3a4a; min-height: 180px; flex-shrink: 0; }
  #info-panel h3 { font-size: 11px; color: #45a29e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  #info-content { font-size: 13px; color: #c5c6c7; line-height: 1.6; }
  #info-content .field { margin-bottom: 6px; display: flex; align-items: baseline; gap: 8px;}
  #info-content .field b { color: #66fcf1; font-weight: 500; min-width: 80px; display: inline-block; }
  #info-content .empty { color: #888; font-style: italic; }
  .neighbor-link { display: block; padding: 4px 8px; margin: 3px 0; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 3px solid transparent; background: rgba(0,0,0,0.2); transition: background 0.2s; }
  .neighbor-link:hover { background: rgba(69, 162, 158, 0.1); }
  #neighbors-list { max-height: 200px; overflow-y: auto; margin-top: 8px; padding-right: 4px; }
  #neighbors-list::-webkit-scrollbar { width: 4px; }
  #neighbors-list::-webkit-scrollbar-thumb { background: #45a29e; border-radius: 4px; }
  #legend-wrap { flex: 1; overflow-y: auto; padding: 15px; }
  #legend-wrap h3 { font-size: 11px; color: #45a29e; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .legend-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; cursor: pointer; border-radius: 4px; font-size: 13px; transition: padding-left 0.2s, background 0.2s; }
  .legend-item:hover { background: rgba(0,0,0,0.2); padding-left: 6px; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 0 5px rgba(0,0,0,0.5); }
  .legend-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .legend-count { color: #888; font-size: 12px; font-weight: 500; }
  #stats { padding: 12px 15px; border-top: 1px solid #2b3a4a; font-size: 11px; color: #888; text-align: center; letter-spacing: 0.05em; background: rgba(0,0,0,0.2); }
  #legend-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 4px 0; border-bottom: 1px dashed #2b3a4a; padding-bottom: 10px; }
  #legend-controls label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; color: #c5c6c7; user-select: none; }
  #legend-controls label:hover { color: #66fcf1; }
  .legend-cb, #select-all-cb { appearance: none; -webkit-appearance: none; width: 16px; height: 16px; border: 1.5px solid #45a29e; border-radius: 4px; background: transparent; cursor: pointer; position: relative; flex-shrink: 0; transition: background 0.2s; }
  .legend-cb:checked, #select-all-cb:checked { background: #45a29e; }
  .legend-cb:checked::after, #select-all-cb:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: solid #0b0c10; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  #select-all-cb:indeterminate { background: #45a29e; }
  #select-all-cb:indeterminate::after { content: ''; position: absolute; left: 3px; top: 6px; width: 8px; height: 2px; background: #0b0c10; border: none; transform: none; }
  
  /* Scrollbar styles for the whole sidebar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0b0c10; }
  ::-webkit-scrollbar-thumb { background: #45a29e; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #66fcf1; }
</style>
</head>
<body>
<div id="graph"></div>
<div id="sidebar">
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search nodes..." autocomplete="off">
    <div id="search-results"></div>
  </div>
  <div id="info-panel">
    <h3>Node Info</h3>
    <div id="info-content"><span class="empty">Click a node to inspect it</span></div>
  </div>
  <div id="legend-wrap">
    <h3>Communities</h3>
    <div id="legend-controls">
      <label><input type="checkbox" id="select-all-cb" checked onchange="toggleAllCommunities(!this.checked)">Select All</label>
    </div>
    <div id="legend"></div>
  </div>
  <div id="stats">444 nodes &middot; 900 edges &middot; 12 communities</div>
</div>

const allNodes = new vis.DataSet(RAW_NODES);
const allEdges = new vis.DataSet(RAW_EDGES);
const container = document.getElementById('graph');
const options = {
  nodes: {
    shape: 'dot',
    borderWidth: 1.5,
    borderWidthSelected: 3
  },
  edges: {
    smooth: { type: 'continuous', forceDirection: 'none' },
    selectionWidth: 2,
    hoverWidth: 1
  },
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -60,
      centralGravity: 0.005,
      springLength: 120,
      springConstant: 0.06,
      damping: 0.8, // Increased from 0.4 to 0.8 to make it settle smoother and slower
      avoidOverlap: 0.1
    },
    timestep: 0.25, // Slows down the visual representation of the physics
    stabilization: { iterations: 150 }
  },
  interaction: {
    hover: true,
    tooltipDelay: 100,
    multiselect: true,
    hideEdgesOnDrag: true // Improves performance and looks cleaner when moving
  },
  layout: { improvedLayout: true }
};
const network = new vis.Network(container, { nodes: allNodes, edges: allEdges }, options);
// Community data
const communities = {};
RAW_NODES.forEach(n => {
  if (!communities[n.community]) communities[n.community] = { name: n.community_name, color: n.color.background, count: 0, visible: true };
  communities[n.community].count++;
});
// Build legend
const legendEl = document.getElementById('legend');
Object.entries(communities).sort((a, b) => b[1].count - a[1].count).forEach(([id, c]) => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = '<input type="checkbox" class="legend-cb" checked data-comm="' + id + '"><span class="legend-dot" style="background:' + c.color + '"></span><span class="legend-label">' + c.name + '</span><span class="legend-count">' + c.count + '</span>';
  div.querySelector('.legend-cb').addEventListener('change', function() { toggleCommunity(parseInt(this.dataset.comm), !this.checked); updateSelectAll(); });
  div.addEventListener('click', (e) => { if (e.target.tagName !== 'INPUT') { const cb = div.querySelector('.legend-cb'); cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); } });
  legendEl.appendChild(div);
});
function toggleCommunity(commId, hide) {
  communities[commId].visible = !hide;
  RAW_NODES.filter(n => n.community === commId).forEach(n => {
    allNodes.update({ id: n.id, hidden: hide });
  });
}
function toggleAllCommunities(hide) {
  Object.keys(communities).forEach(id => {
    toggleCommunity(parseInt(id), hide);
  });
  document.querySelectorAll('.legend-cb').forEach(cb => { cb.checked = !hide; });
}
function updateSelectAll() {
  const cbs = document.querySelectorAll('.legend-cb');
  const checked = Array.from(cbs).filter(c => c.checked).length;
  const all = document.getElementById('select-all-cb');
  all.checked = checked === cbs.length;
  all.indeterminate = checked > 0 && checked < cbs.length;
}
// Search
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = RAW_NODES.filter(n => n.label.toLowerCase().includes(q) || n.source_file.toLowerCase().includes(q)).slice(0, 15);
  searchResults.innerHTML = matches.map(m => '<div class="search-item" data-id="' + m.id + '">' + m.label + ' <span style="color:#45a29e;font-size:11px;margin-left:5px;">' + m.source_file + '</span></div>').join('');
  searchResults.style.display = matches.length ? 'block' : 'none';
  searchResults.querySelectorAll('.search-item').forEach(el => {
    el.addEventListener('click', () => { network.focus(el.dataset.id, { scale: 1.5, animation: true }); network.selectNodes([el.dataset.id]); showNodeInfo(el.dataset.id); searchResults.style.display = 'none'; searchInput.value = ''; });
  });
});
// Node info panel
function showNodeInfo(nodeId) {
  const n = RAW_NODES.find(x => x.id === nodeId);
  if (!n) return;
  const neighbors = [];
  RAW_EDGES.forEach(e => {
    if (e.from === nodeId) neighbors.push({ id: e.to, relation: e.relation, dir: '→' });
    else if (e.to === nodeId) neighbors.push({ id: e.from, relation: e.relation, dir: '←' });
  });
  const info = document.getElementById('info-content');
  let html = '<div class="field"><b>Label</b> ' + n.label + '</div>';
  html += '<div class="field"><b>File</b> <span style="word-break: break-all;">' + n.source_file + '</span></div>';
  html += '<div class="field"><b>Community</b> ' + n.community_name + '</div>';
  html += '<div class="field"><b>Degree</b> ' + n.degree + '</div>';
  if (neighbors.length) {
    html += '<div class="field" style="margin-top: 10px;"><b>Connections (' + neighbors.length + ')</b></div>';
    html += '<div id="neighbors-list">';
    neighbors.forEach(nb => {
      const nbNode = RAW_NODES.find(x => x.id === nb.id);
      const label = nbNode ? nbNode.label : nb.id;
      const color = nbNode ? nbNode.color.background : '#333';
      html += '<span class="neighbor-link" style="border-left-color:' + color + '" data-id="' + nb.id + '"><span style="color:#66fcf1;margin-right:5px;font-weight:bold;">' + nb.dir + '</span> <span style="color:#aaa;font-size:10px;margin-right:5px;">' + nb.relation + '</span> ' + label + '</span>';
    });
    html += '</div>';
  }
  info.innerHTML = html;
  info.querySelectorAll('.neighbor-link').forEach(el => {
    el.addEventListener('click', () => { network.focus(el.dataset.id, { scale: 1.5, animation: true }); network.selectNodes([el.dataset.id]); showNodeInfo(el.dataset.id); });
  });
}
network.on('click', (params) => {
  if (params.nodes.length === 1) showNodeInfo(params.nodes[0]);
  else document.getElementById('info-content').innerHTML = '<span class="empty">Click a node to inspect it</span>';
});
network.on('doubleClick', (params) => {
  if (params.nodes.length === 1) network.focus(params.nodes[0], { scale: 2, animation: true });
});
</script>
</body>
</html>
