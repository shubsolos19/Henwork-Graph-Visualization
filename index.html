<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graph✨</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --accent: #66fcf1;
  --accent2: #45a29e;
  --panel-bg: rgba(10, 14, 20, 0.96);
  --border: rgba(102, 252, 241, 0.15);
  --text: #c5d8e0;
  --text-dim: #6a8a94;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000000;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex; height: 100vh; overflow: hidden;
}
#graph-wrap {
  flex: 1; position: relative; z-index: 1;
  background: #000000;
}
#graph-wrap canvas { display: block; }

#sidebar {
  width: 310px;
  background: var(--panel-bg);
  backdrop-filter: blur(20px);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden; z-index: 10;
  box-shadow: -6px 0 30px rgba(0,0,0,0.8);
}
#header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}
#header-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.18em;
  margin-bottom: 11px;
}
#search-wrap { position: relative; }
#search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--accent2); font-size: 12px; pointer-events: none;
}
#search {
  width: 100%;
  background: rgba(0,10,15,0.8);
  border: 1px solid var(--border);
  color: var(--accent);
  padding: 9px 12px 9px 30px;
  border-radius: 6px; font-size: 12px; outline: none;
  font-family: 'Orbitron', sans-serif; letter-spacing: 0.05em;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#search::placeholder { color: var(--text-dim); font-family: 'Inter', sans-serif; letter-spacing: 0; font-size: 12px; }
#search:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(102,252,241,0.15); }
#search-results {
  max-height: 200px; overflow-y: auto;
  display: none;
  background: rgba(5,10,18,0.98);
  border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 6px 6px;
  position: absolute; width: 100%; z-index: 100;
}
.search-item {
  padding: 7px 14px; cursor: pointer; font-size: 12px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border-left: 2px solid transparent;
  transition: background 0.15s;
}
.search-item:hover { background: rgba(102,252,241,0.06); border-left-color: var(--accent); color: var(--accent); }

#info-panel {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 160px;
}
.panel-label {
  font-family: 'Orbitron', sans-serif; font-size: 8.5px; font-weight: 600;
  color: var(--accent2); letter-spacing: 0.22em;
  text-transform: uppercase; margin-bottom: 11px;
  display: flex; align-items: center; gap: 8px;
}
.panel-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}
#info-content { font-size: 12px; color: var(--text); line-height: 1.65; }
#info-content .field { margin-bottom: 5px; display: flex; align-items: baseline; gap: 8px; }
#info-content .field b { color: var(--accent); font-weight: 500; min-width: 76px; display: inline-block; font-size: 10.5px; letter-spacing: 0.04em; }
#info-content .empty { color: var(--text-dim); font-style: italic; font-size: 11.5px; }
.neighbor-link {
  display: block; padding: 4px 8px; margin: 2px 0;
  border-radius: 4px; cursor: pointer; font-size: 11px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border-left: 2px solid transparent;
  background: rgba(102,252,241,0.025);
  transition: background 0.15s;
}
.neighbor-link:hover { background: rgba(102,252,241,0.07); }
#neighbors-list { max-height: 160px; overflow-y: auto; margin-top: 6px; }

#catalog-wrap { flex: 1; overflow-y: auto; padding: 12px 14px; }
.legend-item {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 6px; cursor: pointer; border-radius: 4px;
  font-size: 12px; transition: background 0.2s;
  border: 1px solid transparent;
}
.legend-item:hover { background: rgba(102,252,241,0.05); border-color: var(--border); }
.legend-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,0.2);
}
.legend-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.legend-count { color: var(--text-dim); font-size: 10.5px; font-variant-numeric: tabular-nums; }
#legend-controls {
  display: flex; align-items: center; margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px dashed rgba(102,252,241,0.1);
}
#legend-controls label { display: flex; align-items: center; gap: 7px; cursor: pointer; font-size: 12px; color: var(--text-dim); user-select: none; }
#legend-controls label:hover { color: var(--accent); }
.legend-cb, #select-all-cb {
  appearance: none; -webkit-appearance: none;
  width: 14px; height: 14px;
  border: 1.5px solid var(--accent2); border-radius: 3px;
  background: transparent; cursor: pointer; position: relative; flex-shrink: 0;
  transition: background 0.2s;
}
.legend-cb:checked, #select-all-cb:checked { background: var(--accent2); border-color: var(--accent); }
.legend-cb:checked::after, #select-all-cb:checked::after {
  content: ''; position: absolute; left: 3px; top: 0.5px;
  width: 3.5px; height: 7px;
  border: solid #020810; border-width: 0 2px 2px 0; transform: rotate(45deg);
}
#select-all-cb:indeterminate { background: rgba(69,162,158,0.4); }
#stats {
  padding: 9px 14px;
  border-top: 1px solid var(--border);
  font-family: 'Orbitron', sans-serif;
  font-size: 9px; color: var(--text-dim);
  text-align: center; letter-spacing: 0.12em;
  background: rgba(0,0,0,0.4);
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(69,162,158,0.35); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent2); }
</style>
</head>
<body>
<div id="graph-wrap"></div>
<div id="sidebar">
  <div id="header">
    <div id="header-title">⬡ CODE UNIVERSE</div>
    <div id="search-wrap">
      <span id="search-icon">✦</span>
      <input id="search" type="text" placeholder="Navigate to star..." autocomplete="off">
      <div id="search-results"></div>
    </div>
  </div>
  <div id="info-panel">
    <div class="panel-label">Celestial Scanner</div>
    <div id="info-content"><span class="empty">Select a star to scan it…</span></div>
  </div>
  <div id="catalog-wrap">
    <div class="panel-label">Star Catalog</div>
    <div id="legend-controls">
      <label><input type="checkbox" id="select-all-cb" checked onchange="toggleAllCommunities(!this.checked)">All Systems</label>
    </div>
    <div id="legend"></div>
  </div>
  <div id="stats">444 STARS &nbsp;·&nbsp; 900 WORMHOLES &nbsp;·&nbsp; 12 SYSTEMS</div>
</div>

// ── vis-network setup ──────────────────────────────────────────────────────
const allNodes = new vis.DataSet(RAW_NODES);
const allEdges = new vis.DataSet(RAW_EDGES);
const container = document.getElementById('graph-wrap');

const options = {
  nodes: { shape: 'dot', borderWidth: 1.5, borderWidthSelected: 3 },
  edges: {
    smooth: { type: 'continuous', forceDirection: 'none' },
    selectionWidth: 2, hoverWidth: 1.5
  },
  physics: {
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -180,  // stronger repulsion to fill more space
      centralGravity: 0.018,        // looser gravity = nodes spread further out
      springLength: 320,            // longer springs = bigger sphere diameter
      springConstant: 0.035,
      damping: 0.85,
      avoidOverlap: 0.5
    },
    timestep: 0.22,
    stabilization: { iterations: 300, fit: true }
  },
  interaction: {
    hover: true, tooltipDelay: 80,
    multiselect: true, hideEdgesOnDrag: true
  },
  layout: { improvedLayout: true }
};

const network = new vis.Network(container, { nodes: allNodes, edges: allEdges }, options);

// ── Particle wormhole overlay ────────────────────────────────────────────────
let particles = [];
let networkReady = false;
const graphCanvas = document.querySelector('#graph-wrap canvas');

network.once('stabilized', () => {
  // Community-separation kick
  const COMM_PUSH_STRENGTH = 0.06;
  const COMM_PUSH_RADIUS = 400;
  const posMap = {};
  Object.assign(posMap, network.getPositions());
  const centroids = {}, counts = {};
  RAW_NODES.forEach(n => {
    const pos = posMap[n.id]; if (!pos) return;
    if (!centroids[n.community]) { centroids[n.community] = { x:0, y:0 }; counts[n.community] = 0; }
    centroids[n.community].x += pos.x; centroids[n.community].y += pos.y; counts[n.community]++;
  });
  Object.keys(centroids).forEach(c => { centroids[c].x /= counts[c]; centroids[c].y /= counts[c]; });
  const nudges = {};
  RAW_NODES.forEach(n => {
    nudges[n.id] = { x:0, y:0 };
    Object.keys(centroids).forEach(otherC => {
      if (parseInt(otherC) === n.community) return;
      const dx = centroids[n.community].x - centroids[otherC].x;
      const dy = centroids[n.community].y - centroids[otherC].y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      if (dist < COMM_PUSH_RADIUS) {
        const force = COMM_PUSH_STRENGTH * (COMM_PUSH_RADIUS - dist) / COMM_PUSH_RADIUS;
        nudges[n.id].x += (dx/dist)*force*180;
        nudges[n.id].y += (dy/dist)*force*180;
      }
    });
  });
  allNodes.update(RAW_NODES.filter(n => posMap[n.id]).map(n => ({
    id: n.id,
    x: posMap[n.id].x + nudges[n.id].x,
    y: posMap[n.id].y + nudges[n.id].y
  })));
  network.setOptions({ physics: { stabilization: { iterations: 150 } } });
  network.startSimulation();
  network.once('stabilized', () => {
    network.fit({ animation: { duration: 1200, easingFunction: 'easeInOutCubic' } });
    networkReady = true;
    spawnParticles();
    requestAnimationFrame(animateParticles);
  });
});

function spawnParticles() {
  RAW_EDGES.filter(e => !e.dashes).forEach(e => {
    if (Math.random() > 0.35) return;
    const baseColor = (e.color && e.color.color) ? e.color.color : 'rgba(102,252,241,0.4)';
    for (let i = 0; i < 2; i++) {
      particles.push({ from: e.from, to: e.to, t: Math.random(), speed: 0.0008 + Math.random()*0.0012, color: baseColor, r: Math.random()*1.4+0.5, alpha: 0 });
    }
  });
}

function animateParticles() {
  requestAnimationFrame(animateParticles);
  if (!networkReady || !graphCanvas) return;
  const ctx = graphCanvas.getContext('2d');
  if (!ctx) return;
  particles.forEach(p => {
    p.t += p.speed; if (p.t > 1) p.t = 0;
    p.alpha = Math.sin(p.t * Math.PI) * 0.8;
    const posA = network.getPosition(p.from);
    const posB = network.getPosition(p.to);
    if (!posA || !posB) return;
    const canA = network.canvasToDOM(posA);
    const canB = network.canvasToDOM(posB);
    const x = canA.x + (canB.x - canA.x) * p.t;
    const y = canA.y + (canB.y - canA.y) * p.t;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.arc(x, y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  });
}

// ── Community state ─────────────────────────────────────────────────────────
const communities = {};
RAW_NODES.forEach(n => {
  if (!communities[n.community]) communities[n.community] = { name: n.community_name, color: n.color.background, count: 0, visible: true };
  communities[n.community].count++;
});

// ── Legend ──────────────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
Object.entries(communities).sort((a, b) => b[1].count - a[1].count).forEach(([id, c]) => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML =
    '<input type="checkbox" class="legend-cb" checked data-comm="' + id + '">' +
    '<span class="legend-dot" style="background:' + c.color + '"></span>' +
    '<span class="legend-label">' + c.name + '</span>' +
    '<span class="legend-count">' + c.count + '</span>';
  div.querySelector('.legend-cb').addEventListener('change', function() { toggleCommunity(parseInt(this.dataset.comm), !this.checked); updateSelectAll(); });
  div.addEventListener('click', e => {
    if (e.target.tagName !== 'INPUT') { const cb = div.querySelector('.legend-cb'); cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
  });
  legendEl.appendChild(div);
});

function toggleCommunity(commId, hide) {
  communities[commId].visible = !hide;
  RAW_NODES.filter(n => n.community === commId).forEach(n => allNodes.update({ id: n.id, hidden: hide }));
}
function toggleAllCommunities(hide) {
  Object.keys(communities).forEach(id => toggleCommunity(parseInt(id), hide));
  document.querySelectorAll('.legend-cb').forEach(cb => { cb.checked = !hide; });
}
function updateSelectAll() {
  const cbs = document.querySelectorAll('.legend-cb');
  const checked = Array.from(cbs).filter(c => c.checked).length;
  const all = document.getElementById('select-all-cb');
  all.checked = checked === cbs.length;
  all.indeterminate = checked > 0 && checked < cbs.length;
}

// ── Search ──────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { searchResults.style.display = 'none'; return; }
  const matches = RAW_NODES.filter(n => n.title.toLowerCase().includes(q) || n.source_file.toLowerCase().includes(q)).slice(0, 15);
  searchResults.innerHTML = matches.map(m =>
    '<div class="search-item" data-id="' + m.id + '">' + m.title +
    ' <span style="color:var(--text-dim);font-size:10px;margin-left:6px;">' + m.source_file + '</span></div>'
  ).join('');
  searchResults.style.display = matches.length ? 'block' : 'none';
  searchResults.querySelectorAll('.search-item').forEach(el => {
    el.addEventListener('click', () => {
      network.focus(el.dataset.id, { scale: 1.6, animation: { duration: 800, easingFunction: 'easeInOutCubic' } });
      network.selectNodes([el.dataset.id]);
      showNodeInfo(el.dataset.id);
      searchResults.style.display = 'none';
      searchInput.value = '';
    });
  });
});
document.addEventListener('click', e => {
  if (!searchResults.contains(e.target) && e.target !== searchInput) searchResults.style.display = 'none';
});

// ── Node Info ───────────────────────────────────────────────────────────────
function showNodeInfo(nodeId) {
  const n = RAW_NODES.find(x => x.id === nodeId);
  if (!n) return;
  const neighbors = [];
  RAW_EDGES.forEach(e => {
    if (e.from === nodeId) neighbors.push({ id: e.to, relation: e.relation, dir: '→' });
    else if (e.to === nodeId) neighbors.push({ id: e.from, relation: e.relation, dir: '←' });
  });
  const info = document.getElementById('info-content');
  const dot = '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:' + n.color.background + ';flex-shrink:0;margin-right:6px;vertical-align:middle"></span>';
  let html = '<div style="display:flex;align-items:center;margin-bottom:9px;">' + dot + '<span style="font-weight:500;color:#e8f4f6;font-size:12.5px;">' + n.title + '</span></div>';
  html += '<div class="field"><b>System</b>' + n.community_name + '</div>';
  html += '<div class="field"><b>File</b><span style="word-break:break-all;font-size:10.5px;color:var(--text-dim)">' + n.source_file + '</span></div>';
  html += '<div class="field"><b>Connections</b>' + n.degree + '</div>';
  if (neighbors.length) {
    html += '<div style="margin-top:8px;font-size:10px;color:var(--text-dim);letter-spacing:0.08em;margin-bottom:3px;">LINKED (' + neighbors.length + ')</div>';
    html += '<div id="neighbors-list">';
    neighbors.forEach(nb => {
      const nbNode = RAW_NODES.find(x => x.id === nb.id);
      const label = nbNode ? nbNode.title : nb.id;
      const color = nbNode ? nbNode.color.background : '#444';
      html += '<span class="neighbor-link" style="border-left-color:' + color + '" data-id="' + nb.id + '">' +
        '<span style="color:var(--accent);margin-right:4px;font-weight:bold;font-size:10px;">' + nb.dir + '</span>' +
        '<span style="color:var(--text-dim);font-size:9.5px;margin-right:4px;">' + nb.relation + '</span>' + label + '</span>';
    });
    html += '</div>';
  }
  info.innerHTML = html;
  info.querySelectorAll('.neighbor-link').forEach(el => {
    el.addEventListener('click', () => {
      network.focus(el.dataset.id, { scale: 1.6, animation: { duration: 600, easingFunction: 'easeInOutCubic' } });
      network.selectNodes([el.dataset.id]);
      showNodeInfo(el.dataset.id);
    });
  });
}

network.on('click', params => {
  if (params.nodes.length === 1) showNodeInfo(params.nodes[0]);
  else document.getElementById('info-content').innerHTML = '<span class="empty">Select a star to scan it…</span>';
});
network.on('doubleClick', params => {
  if (params.nodes.length === 1)
    network.focus(params.nodes[0], { scale: 2.2, animation: { duration: 800, easingFunction: 'easeInOutCubic' } });
});
</script>
</body>
</html>
